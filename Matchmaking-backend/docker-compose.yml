services:

  mysql:
    image: mysql:8.4
    container_name: matchmaking-backend-mysql

    environment:
      MYSQL_DATABASE: matchmaking_db
      MYSQL_USER: matchmaking_user
      MYSQL_PASSWORD: matchmaking_password
      MYSQL_ROOT_PASSWORD: root_password

    ports:
      - "3307:3306"

    volumes:
      - matchmaking-backend-mysql:/var/lib/mysql

    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-proot_password"
        ]
      interval: 10s
      timeout: 5s
      retries: 10


  qdrant:
    image: qdrant/qdrant:latest
    container_name: matchmaking-backend-qdrant

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - matchmaking-backend-qdrant:/qdrant/storage


  app:
    build: .
    container_name: matchmaking-backend-app

    ports:
      - "8080:8080"

    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: matchmaking_db
      DB_USERNAME: matchmaking_user
      DB_PASSWORD: matchmaking_password

      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334

      AI_PROVIDER: ollama
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.2
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text

      JWT_SECRET: ${JWT_SECRET}

    depends_on:
      mysql:
        condition: service_healthy

      qdrant:
        condition: service_started


volumes:
  matchmaking-backend-mysql:
  matchmaking-backend-qdrant: