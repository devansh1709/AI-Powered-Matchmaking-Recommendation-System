spring.application.name=apni-shadi
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/apni_shadi?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=${OPENAI_MODEL:gpt-5-mini}
app.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}

app.ai.provider=${AI_PROVIDER:gemini}
app.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
app.ollama.model=${OLLAMA_MODEL:llama3.2}
# Local testing option: paste your Gemini test key after the colon below, or set GEMINI_API_KEY.
